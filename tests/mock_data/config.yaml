bucketsToConsolidate: # The source buckets
  - bucket: 'inputs-a'
    path:
      - static_path: 'logs'
      - datefmt: '2006/01/02/15'
    force_env: support
  - bucket: 'input-b'
    path:
      - static_path: 'datadog'
      - datefmt: 'dt=20060102/h=15'
    force_env: int
    proceed_without_matching_objects: true
  - bucket: 'input-c'
    path:
      - static_path: 'logs'
      - datefmt: '2006/01/02/15'
    force_env: stg
bucketsConsolidated: # Where the consolidated output goes. Only one element is really supported as of now.
  - bucket: output-a
  # - bucket: support-infra-logs-consolidated-archives # test bucket
    path:
      - static_path: log-archives
      - datefmt: 'dt=20060102/h=15'
bucketsCheckerResults:  # Where to find checker results
  - bucket: 'output-b'
    path:
      - datefmt: 'results-continuous/dt=20060102/hour=15'
continuousConsolidation:  # Parameters for continuous consolidation, where the consolidator determines a single target date on its own
  maxAge: 528h # 30 days
  minAge: 70m
  step: 1h
